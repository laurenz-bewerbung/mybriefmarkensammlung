<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategorien verwalten - MyBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:src="@{/js/category-tree.js}" defer></script>
</head>
<body>

<div th:replace="~{header :: main-header}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="category-tree-container shadow-sm">
                <h2 class="fw-bold mb-4">📂 Kategorien verwalten</h2>

                <ul th:if="${categories != null && !categories.isEmpty()}"
                    th:replace="~{::categoryTree(nodes=${categories})}"
                    class="tree-group">
                </ul>

                <div class="tree-group">
                    <div class="category-node">
                        <div class="category-content main-add-node" onclick="showInlineForm(null)">
                            <span class="category-name text-center">
                                <i class="bi bi-plus-lg me-2"></i> Neue Hauptkategorie hinzufügen
                            </span>
                        </div>
                        <div id="form-container-null" class="inline-form-container"></div>
                    </div>
                </div>

                <div th:if="${categories == null || categories.isEmpty()}" class="text-center py-4 text-muted">
                    <small>Noch keine Kategorien angelegt.</small>
                </div>
            </div>

        </div>
    </div>
</main>

<ul th:fragment="categoryTree(nodes)" class="tree-group">
    <li th:each="node : ${nodes}" th:id="'node-' + ${node.category.id}" class="category-node">

        <div class="category-content border shadow-sm">
            <a th:href="@{/sammlungen(category=${node.category.id})}"
               class="category-link d-flex align-items-center flex-grow-1 text-decoration-none text-dark">
                <i class="bi bi-folder2-open me-2 text-primary"></i>
                <span class="category-name" th:text="${node.category.name}">Kategorie</span>
            </a>

            <button type="button" class="btn-add ms-2"
                    th:onclick="'event.stopPropagation(); showInlineForm(' + ${node.category.id} + ')'">
                +
            </button>
        </div>

        <div th:id="'form-container-' + ${node.category.id}" class="inline-form-container"></div>

        <div class="children-container" th:if="${!node.children.isEmpty()}">
            <div th:replace="~{::categoryTree(nodes=${node.children})}"></div>
        </div>
    </li>
</ul>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
