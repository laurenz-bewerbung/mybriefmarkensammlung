<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorien verwalten - MyBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{header :: main-header}"></div>

<main class="container my-3 my-md-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="bg-white p-3 p-md-4 rounded shadow-sm">
                <h2 class="fw-bold mb-4">Kategorien</h2>

                <ul th:if="${categories != null && !categories.isEmpty()}"
                    th:replace="~{::categoryTree(nodes=${categories})}"
                    class="list-unstyled">
                </ul>

                <div class="mt-4">
                    <details class="border rounded shadow-sm">
                        <summary class="p-3 text-center text-success fw-bold" style="list-style: none; cursor: pointer;">
                            <i class="bi bi-plus-circle-fill me-2"></i> Neue Hauptkategorie hinzufügen
                        </summary>

                        <div class="p-3 bg-light border-top">
                            <form th:action="@{/categories}" method="post" class="row g-2">
                                <div class="col-12 col-sm">
                                    <input type="text" name="category" placeholder="Name der Hauptkategorie..."
                                           class="form-control" required />
                                </div>
                                <div class="col-12 col-sm-auto d-grid">
                                    <button type="submit" class="btn btn-success px-4">Erstellen</button>
                                </div>
                            </form>
                        </div>
                    </details>
                </div>

                <div th:if="${categories == null || categories.isEmpty()}" class="text-center py-5 text-muted">
                    <i class="bi bi-folder-x display-4 d-block mb-3"></i>
                    <p>Noch keine Kategorien angelegt.</p>
                </div>
            </div>

        </div>
    </div>
</main>

<ul th:fragment="categoryTree(nodes)" class="list-unstyled">
    <li th:each="node : ${nodes}" class="py-1">

        <div class="d-flex align-items-center flex-wrap gap-2">
            <a th:href="@{/sammlungen(category=${node.category.id})}"
               class="text-decoration-none text-dark flex-grow-1 py-1">
                <i class="bi bi-folder2 text-primary me-1"></i>
                <span th:text="${node.category.name}">Kategorie</span>
            </a>

            <details class="position-relative">
                <summary class="btn btn-sm btn-light border py-0 px-2" style="list-style: none; cursor: pointer;">
                    <i class="bi bi-plus-lg"></i>
                </summary>

                <div class="mt-2 p-2 border rounded bg-white shadow-sm"
                     style="min-width: 200px; z-index: 1000;">
                    <form th:action="@{/categories}" method="post" class="d-flex gap-1">
                        <input type="hidden" name="parentId" th:value="${node.category.id}" />
                        <input type="text" name="category" placeholder="Name..."
                               class="form-control form-control-sm" required />
                        <button type="submit" class="btn btn-sm btn-success">OK</button>
                    </form>
                </div>
            </details>
        </div>

        <div class="ms-3 ms-md-4 border-start ps-2 mt-1" th:if="${!node.children.isEmpty()}">
            <ul th:replace="~{::categoryTree(nodes=${node.children})}"></ul>
        </div>
    </li>
</ul>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
