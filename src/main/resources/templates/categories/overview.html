<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategorien verwalten - MyBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div th:replace="~{header :: main-header}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="category-tree-container shadow-sm">
                <h2 class="fw-bold mb-4">Kategorien</h2>

                <ul th:if="${categories != null && !categories.isEmpty()}"
                    th:replace="~{::categoryTree(nodes=${categories})}"
                    class="tree-group">
                </ul>

                <div class="tree-group mt-4">
                    <div class="category-node">
                        <details class="main-add-details">
                            <summary class="category-content main-add-node border shadow-sm p-3 text-center" style="list-style: none; cursor: pointer;">
                <span class="category-name">
                    <i class="bi bi-plus-lg me-2"></i> Neue Hauptkategorie hinzufügen
                </span>
                            </summary>

                            <div class="mt-2 p-3 border rounded bg-light shadow-sm">
                                <form th:action="@{/categories}" method="post" class="d-flex gap-2">
                                    <input type="text" name="category" placeholder="Name der Hauptkategorie..."
                                           class="form-control" required autofocus />
                                    <button type="submit" class="btn btn-success">Erstellen</button>
                                </form>
                            </div>
                        </details>
                    </div>
                </div>

                <div th:if="${categories == null || categories.isEmpty()}" class="text-center py-4 text-muted">
                    <small>Noch keine Kategorien angelegt.</small>
                </div>
            </div>

        </div>
    </div>
</main>

<ul th:fragment="categoryTree(nodes)" class="tree-group">
    <li th:each="node : ${nodes}" class="category-node list-group-item border-0">
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/sammlungen(category=${node.category.id})}" class="text-decoration-none">
                <i class="bi bi-folder2"></i>
                <span th:text="${node.category.name}">Kategorie</span>
            </a>

            <details class="d-inline">
                <summary class="btn btn-sm btn-light py-0 px-1" style="list-style: none; cursor: pointer;">
                    <i class="bi bi-plus-lg"></i>
                </summary>

                <div class="mt-2 p-2 border rounded bg-white shadow-sm" style="position: absolute; z-index: 100;">
                    <form th:action="@{/categories}" method="post" class="d-flex gap-2">
                        <input type="hidden" name="parentId" th:value="${node.category.id}" />
                        <input type="text" name="category" placeholder="Neue Unterkategorie"
                               class="form-control form-control-sm" required autofocus />
                        <button type="submit" class="btn btn-sm btn-success">OK</button>
                    </form>
                </div>
            </details>
        </div>

        <div class="ms-4 mt-2" th:if="${!node.children.isEmpty()}">
            <ul th:replace="~{::categoryTree(nodes=${node.children})}"></ul>
        </div>
    </li>
</ul>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
