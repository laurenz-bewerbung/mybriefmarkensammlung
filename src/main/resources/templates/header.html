<header th:fragment="main-header" class="w-100">
    <div class="full-width-header">
        <div class="container-fluid p-0">
            <div class="row g-0 no-gutter">
                <div class="col-6">
                    <img th:src="@{/images/banner1.png}" alt="Banner Links" class="w-100 d-block" style="height: 300px; object-fit: cover; object-position: right;">
                </div>
                <div class="col-6">
                    <img th:src="@{/images/banner1.png}" alt="Banner Rechts" class="w-100 d-block" style="height: 300px; object-fit: cover; object-position: left; filter: brightness(1.05);">
                </div>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark m-0 border-0">
            <div class="container-fluid px-4">
                <a class="navbar-brand d-flex align-items-center" href="/">
                    <img th:src="@{/images/logo.png}" alt="Logo" class="rounded-circle bg-white" style="height: 50px; width: 50px;">
                    <span class="ms-2 fw-bold">MyBriefmarkenSammlung</span>
                </a>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                        <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/sammlungen}">Sammlungen</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Kategorien</a></li>

                        <li class="nav-item" sec:authorize="isAnonymous()">
                            <a class="nav-link" th:href="@{/login}">Login</a>
                        </li>

                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="nav-link btn btn-link shadow-none border-0"
                                        style="display: inline; padding: var(--bs-nav-link-padding-y) var(--bs-nav-link-padding-x);">
                                    Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
</header>
