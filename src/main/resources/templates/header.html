<header th:fragment="main-header" class="w-100">
    <div class="full-width-header">

        <div class="container-fluid p-0">
            <div class="row g-0">
                <div class="col-6">
                    <img th:src="@{/images/banner1.png}" alt="Banner Links"
                         class="w-100 d-block d-md-none" style="height: 150px; object-fit: cover; object-position: right;">
                    <img th:src="@{/images/banner1.png}" alt="Banner Links"
                         class="w-100 d-none d-md-block" style="height: 300px; object-fit: cover; object-position: right;">
                </div>
                <div class="col-6">
                    <img th:src="@{/images/banner1.png}" alt="Banner Rechts"
                         class="w-100 d-block d-md-none" style="height: 150px; object-fit: cover; object-position: left; filter: brightness(1.05);">
                    <img th:src="@{/images/banner1.png}" alt="Banner Rechts"
                         class="w-100 d-none d-md-block" style="height: 300px; object-fit: cover; object-position: left; filter: brightness(1.05);">
                </div>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark m-0 border-0 shadow-sm">
            <div class="container-fluid px-3 px-md-4">
                <a class="navbar-brand d-flex align-items-center" href="/">
                    <img th:src="@{/images/logo.png}" alt="Logo" class="rounded-circle bg-white" style="height: 40px; width: 40px;">
                    <span class="ms-2 fw-bold d-none d-sm-inline">MyBriefmarkenSammlung</span>
                    <span class="ms-2 fw-bold d-inline d-sm-none">MyBS</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center text-center text-lg-start" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                        <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/sammlungen}">Sammlungen</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Kategorien</a></li>

                        <li class="nav-item" sec:authorize="isAnonymous()">
                            <a class="nav-link" th:href="@{/login}">Login</a>
                        </li>

                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <form th:action="@{/logout}" method="post" class="d-inline w-100">
                                <button type="submit" class="nav-link btn btn-link shadow-none border-0 w-100 py-2 py-lg-0"
                                        style="text-decoration: none;">
                                    Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
</header>
