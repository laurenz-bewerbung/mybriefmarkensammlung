<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - mybriefmarkensammlung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{header :: main-header}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-6">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-4">Anmelden</h2>

                    <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                        Benutzername oder Passwort falsch.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
                        Erfolgreich abgemeldet.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-bold">Benutzername</label>
                            <input type="text" id="username" name="username" class="form-control shadow-sm" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold">Passwort</label>
                            <input type="password" id="password" name="password" class="form-control shadow-sm" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">
                            Einloggen
                        </button>
                    </form>
                </div>

                <div class="card-footer bg-transparent border-0 text-center pb-4">
                    <p class="small text-muted mb-0">
                        Noch kein Konto? <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">Hier registrieren</a>
                    </p>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/sammlungen}" class="btn btn-link btn-sm text-secondary text-decoration-none">
                    ← Zurück zur Übersicht
                </a>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
