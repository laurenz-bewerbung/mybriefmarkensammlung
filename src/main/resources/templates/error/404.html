<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | MyBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        body { background-color: #f8f9fa; }
        .error-container { min-height: 80vh; display: flex; align-items: center; }
        .error-card { border: none; border-radius: 1rem; }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(45deg, #0d6efd, #0dcaf0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .stamp-icon { font-size: 3rem; color: #dee2e6; }
    </style>
</head>
<body>

<div th:replace="~{header :: main-header}"></div>

<div class="container error-container">
    <div class="row justify-content-center w-100">
        <div class="col-lg-6 col-md-8 text-center">

            <div class="error-code mb-2">404</div>
            <h1 class="display-6 fw-bold mb-4">Hoppla! Seite nicht gefunden.</h1>

            <div class="card error-card shadow-sm mb-5">
                <div class="card-body p-4 p-md-5">

                    <div th:if="${errorMessage}" class="alert alert-light border mb-4">
                        <p class="mb-0 text-dark italic">
                            <strong class="text-primary">Hinweis:</strong>
                            <span th:text="${errorMessage}">Die angeforderte Sammlung existiert leider nicht.</span>
                        </p>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="/sammlungen" class="btn btn-primary px-4 py-2 shadow-sm">
                            Zurück zur Übersicht
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 py-2">
                            Zurück zur letzten Seite
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
